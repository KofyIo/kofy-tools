<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kofy AI — Test Console</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 2rem;
    }

    .header {
      max-width: 700px;
      margin: 0 auto 2rem;
    }

    .logo { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; color: #555; text-transform: uppercase; margin-bottom: 0.3rem; }
    h1   { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    .sub { color: #666; font-size: 0.85rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.8rem;
      max-width: 700px;
      margin: 0 auto 1.5rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

    input, select, textarea {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 0.7rem 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #555; }
    textarea { resize: vertical; min-height: 100px; }
    select option { background: #1a1a1a; }

    .field { margin-bottom: 1rem; }

    button {
      width: 100%;
      padding: 0.9rem;
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 9px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Result card */
    .result-card {
      max-width: 700px;
      margin: 0 auto;
      border-radius: 14px;
      padding: 1.8rem;
      display: none;
      border: 1px solid #2a2a2a;
    }
    .result-card.green  { background: #0a1f12; border-color: #1a4a2a; }
    .result-card.yellow { background: #1f1a0a; border-color: #4a3a1a; }
    .result-card.red    { background: #1f0a0a; border-color: #4a1a1a; }
    .result-card.error  { background: #1a0a1a; border-color: #3a1a3a; }

    .flag-badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .green  .flag-badge { background: #1a4a2a; color: #3ecf6a; }
    .yellow .flag-badge { background: #4a3a1a; color: #e0b84a; }
    .red    .flag-badge { background: #4a1a1a; color: #e05252; }
    .error  .flag-badge { background: #3a1a3a; color: #c07ae0; }

    .result-section { margin-bottom: 1.2rem; }
    .result-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }
    .result-text {
      font-size: 0.92rem;
      line-height: 1.6;
      color: #ddd;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 0.8rem 1rem;
    }
    .result-text.reply { color: #f0f0f0; font-size: 0.95rem; }

    .sent-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      background: #1a4a2a;
      color: #3ecf6a;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .pending-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      background: #4a3a1a;
      color: #e0b84a;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #444;
      border-top-color: #f0f0f0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .examples {
      max-width: 700px;
      margin: 0 auto 1.5rem;
    }
    .examples-label {
      font-size: 0.75rem;
      color: #555;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
    }
    .example-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .chip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #555; color: #f0f0f0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Kofy AI</div>
    <h1>Test Console</h1>
    <p class="sub">Send a message and see what Claude replies — including the flag and reason.</p>
  </div>

  <div class="examples">
    <div class="examples-label">Quick examples</div>
    <div class="example-chips">
      <div class="chip" onclick="fill('What are your prices?', 'Instagram', '@coffeelovers')">Pricing question</div>
      <div class="chip" onclick="fill('I love your product, where can I buy it?', 'YouTube', '@subscriber99')">Where to buy</div>
      <div class="chip" onclick="fill('I want a refund, this was terrible.', 'Email', 'angry@customer.com')">Refund complaint</div>
      <div class="chip" onclick="fill('Do you ship to Colombia?', 'WhatsApp', '+573001234567')">Shipping question</div>
      <div class="chip" onclick="fill('Are you looking for investors?', 'Instagram', '@venturecap')">Investor inquiry</div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label>Platform</label>
        <select id="platform">
          <option>Instagram</option>
          <option>YouTube</option>
          <option>WhatsApp</option>
          <option>Email</option>
        </select>
      </div>
      <div class="field">
        <label>Customer handle / email / number</label>
        <input id="handle" type="text" placeholder="@username or email" />
      </div>
    </div>

    <div class="field">
      <label>Source context <span style="color:#555;font-weight:400;text-transform:none">(optional — e.g. "YouTube — Summer video")</span></label>
      <input id="context" type="text" placeholder="Leave blank for direct message" />
    </div>

    <div class="field">
      <label>Customer message</label>
      <textarea id="message" placeholder="Type the customer's message here…"></textarea>
    </div>

    <button id="btn" onclick="sendMessage()">Send to Kofy AI</button>
  </div>

  <div class="result-card" id="result">
    <div class="flag-badge" id="flag-badge"></div>
    <div class="result-section">
      <div class="result-label">Drafted Reply <span id="sent-badge"></span></div>
      <div class="result-text reply" id="reply-text"></div>
    </div>
    <div class="result-section">
      <div class="result-label">Flag Reason</div>
      <div class="result-text" id="reason-text"></div>
    </div>
  </div>

  <script>
    const WORKER = "https://kofy-ai.delicate-surf-529c.workers.dev";

    function fill(message, platform, handle) {
      document.getElementById("message").value  = message;
      document.getElementById("platform").value = platform;
      document.getElementById("handle").value   = handle;
      document.getElementById("context").value  = "";
    }

    async function sendMessage() {
      const message  = document.getElementById("message").value.trim();
      const platform = document.getElementById("platform").value;
      const handle   = document.getElementById("handle").value.trim();
      const context  = document.getElementById("context").value.trim();

      if (!message) {
        document.getElementById("message").focus();
        return;
      }

      const btn    = document.getElementById("btn");
      const result = document.getElementById("result");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Thinking…`;
      result.style.display = "none";

      try {
        const res = await fetch(`${WORKER}/message`, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            platform,
            customer_handle: handle || "unknown",
            message,
            source_context:  context || null,
          }),
        });

        const data = await res.json();

        if (data.error) throw new Error(data.detail ? JSON.stringify(data.detail) : data.error);

        const { flag, reply, reason, sent } = data;

        result.className     = `result-card ${flag}`;
        result.style.display = "block";

        const emoji = flag === "green" ? "🟢" : flag === "yellow" ? "🟡" : "🔴";
        document.getElementById("flag-badge").textContent = `${emoji} ${flag} flag`;
        document.getElementById("reply-text").textContent = reply;
        document.getElementById("reason-text").textContent = reason;

        const badge = document.getElementById("sent-badge");
        if (sent) {
          badge.className   = "sent-badge";
          badge.textContent = "✓ Auto-sent";
        } else {
          badge.className   = "pending-badge";
          badge.textContent = "⏳ Pending approval";
        }

        result.scrollIntoView({ behavior: "smooth", block: "nearest" });

      } catch (e) {
        result.className     = "result-card error";
        result.style.display = "block";
        document.getElementById("flag-badge").textContent  = "⚠ Error";
        document.getElementById("reply-text").textContent  = e.message;
        document.getElementById("reason-text").textContent = "Check that your worker is deployed and the ANTHROPIC_KEY variable is set correctly.";
        document.getElementById("sent-badge").textContent  = "";
      }

      btn.disabled = false;
      btn.textContent = "Send to Kofy AI";
    }

    document.getElementById("message").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) sendMessage();
    });
  </script>
</body>
</html>
