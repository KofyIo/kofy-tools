name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/kofy-worker-v4.js'
      - 'workers/kofy-ai-worker.js'

jobs:

  deploy-notion-proxy:
    name: kofy-notion-proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy --config wrangler.notion-proxy.toml

  deploy-ai:
    name: kofy-ai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy --config wrangler.ai.toml
